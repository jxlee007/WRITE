ied operation. This trauma becomes Alpha's primary vengeance motivation and psychological driving force.","tags":["#sacrifice","#trauma","#catalyst"],"year":"2010s"},{"id":"03c","slug":"/SPY/case/03c","title":"03c • RAW RECRUITMENT","date":"2012","summary":"Research and Analysis Wing approaches Alpha for covert intelligence service. Offer includes complete identity erasure and specialized training in exchange for operational commitment.","tags":["#RAW","#recruitment","#identity_erasure"],"year":"2010s"},{"id":"03d","slug":"/SPY/case/03d","title":"03d • INTENSIVE CONDITIONING","date":"2012","summary":"Alpha undergoes comprehensive RAW training program. Develops advanced skills in combat, stealth, cyber operations, and psychological manipulation. Earns respect of international training partners.","tags":["#training","#skills","#international"],"year":"2010s"},{"id":"04a","slug":"/SPY/case/04a","title":"04a • MIDDLE EAST BRIEFING","date":"2013","summary":"Alpha receives classified briefing for covert operations across Iran, Iraq, and Syria. Mission: dismantle corruption networks financing regional instability.","tags":["#middle_east","#briefing","#corruption"],"year":"2010s"},{"id":"04b","slug":"/SPY/case/04b","title":"04b • DESERT OPERATIONS","date":"2013","summary":"Alpha executes covert sabotage missions across desert regions. Successfully dismantles financial infrastructure supporting regional conflicts, collecting evidence of high-level corruption.","tags":["#desert","#sabotage","#evidence"],"year":"2010s"},{"id":"04c","slug":"/SPY/case/04c","title":"04c • POLITICAL EXPOSURE","date":"2013","summary":"Alpha's operations expose high-level political corruption. Leaked intelligence reveals powerful actors' involvement in regional destabilization, creating dangerous enemies including Colonel Malhotra.","tags":["#exposure","#politics","#enemies"],"year":"2010s"},{"id":"04d","slug":"/SPY/case/04d","title":"04d • GOING ROGUE","date":"2014","summary":"Alpha signals rogue i ead, climbs through academic and government ranks. Becomes expert behavioral scientist and tracker, unknowingly preparing for eventual confrontation with her past.","tags":["#career","#advancement","#tracking"],"year":"2010s"},{"id":"05c","slug":"/SPY/case/05c","title":"05c • MALHOTRA'S DISCOVERY","date":"2018","summary":"Colonel Malhotra discovers Dr. Kumar's college connection to Alpha through intelligence analysis. Recognizes her as potential vector for locating his primary target.","tags":["#discovery","#connection","#targeting"],"year":"2010s"},{"id":"05d","slug":"/SPY/case/05d","title":"05d • LONDON ASSIGNMENT","date":"2018","summary":"Dr. Kumar receives London assignment, unknowingly walking into Malhotra's trap. Diplomatic yacht event planned as test scenario to draw out potential Alpha intervention.","tags":["#london","#assignment","#trap"],"year":"2010s"},{"id":"06a","slug":"/SPY/case/06a","title":"06a • THE YACHT GAMBIT","date":"2020","summary":"Thames yacht event proceeds as planned. Alpha detects trap and infiltrates basement, neutralizing threats while Dr. Kumar remains unaware above deck. Perfect stealth intervention.","tags":["#yacht","#infiltration","#intervention"],"year":"2020s"},{"id":"06b","slug":"/SPY/case/06b","title":"06b • ESCALATING PRESSURE","date":"2020","summary":"Malhotra, frustrated by yacht failure, intensifies surveillance and pressure on Dr. Kumar. Plans building-based trap to force confrontation with mysterious protector.","tags":["#pressure","#surveillance","#escalation"],"year":"2020s"},{"id":"06c","slug":"/SPY/case/06c","title":"06c • ALPHA'S DECISION","date":"2020","summary":"Alpha recognizes Malhotra's escalating threat to Dr. Kumar. Plans comprehensive building assault to extract her and fake their deaths, ending the hunt permanently.","tags":["#decision","#planning","#commitment"],"year":"2020s"},{"id":"06d","slug":"/SPY/case/06d","title":"06d • BUILDING INFILTRATION","date":"2020","summary":"Alpha executes building assault
