name: goalflow
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  go_router: ^17.1.0
  google_fonts: ^8.0.2
  intl: ^0.20.2
  lucide_icons: ^0.257.0
  provider: ^6.1.5+1
  shared_preferences: ^2.5.4
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  audioplayers: ^5.2.1
  vibration: ^3.1.8
  flutter_timezone: ^5.0.2
  permission_handler: ^12.0.1
  app_settings: ^7.0.0
  confetti: ^0.7.0
  shimmer: ^3.0.0
  flutter_slidable: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#047857"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/sounds/
