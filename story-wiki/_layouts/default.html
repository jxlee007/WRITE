---
layout: default
---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
</head>
<body>
  
  <!-- Fixed Top Navigation Bar -->
  <header class="top-nav">
    <div class="top-nav-brand">
      <a href="{{ '/story-wiki/' | relative_url }}">
        <span class="neon-text">>_ {{ site.title }}</span>
      </a>
    </div>
    <div class="top-nav-toggle" id="mobile-menu-toggle">
      <span>[ M E N U ]</span>
    </div>
  </header>

  <div class="site-wrapper">
    <!-- Left Sidebar -->
    <aside class="sidebar" id="sidebar">
      {% include nav.html %}
    </aside>

    <!-- Main Content Area -->
    <main class="content-area">
      <article class="wiki-content">
        <h1 class="page-title">{{ page.title }}</h1>
        
        <!-- Auto Table of Contents script target -->
        <div id="auto-toc" class="toc-container">
          <div class="toc-title">Contents <span class="toc-toggle">[<a href="#" id="toc-toggle-btn">hide</a>]</span></div>
          <ul id="toc-list"></ul>
        </div>
        
        <div class="page-body">
          {{ content }}
        </div>
      </article>
    </main>
  </div>

  <script>
    // Auto Table of Contents Generator
    document.addEventListener("DOMContentLoaded", function() {
      const pageBody = document.querySelector('.page-body');
      const tocList = document.getElementById('toc-list');
      const tocContainer = document.getElementById('auto-toc');
      
      const headers = pageBody.querySelectorAll('h2, h3');
      if (headers.length < 2) {
        tocContainer.style.display = 'none';
        return;
      }

      headers.forEach(function(header, index) {
        // Ensure header has an ID
        if (!header.id) {
          header.id = "heading-" + index;
        }

        const li = document.createElement('li');
        li.className = 'toc-item toc-' + header.tagName.toLowerCase();
        
        const a = document.createElement('a');
        a.href = '#' + header.id;
        a.textContent = header.textContent;
        
        li.appendChild(a);
        tocList.appendChild(li);
      });

      // TOC Toggle
      const tocToggleBtn = document.getElementById('toc-toggle-btn');
      tocToggleBtn.addEventListener('click', function(e) {
        e.preventDefault();
        if (tocList.style.display === 'none') {
          tocList.style.display = 'block';
          this.textContent = 'hide';
        } else {
          tocList.style.display = 'none';
          this.textContent = 'show';
        }
      });

      // Mobile Menu Toggle
      const mobileToggle = document.getElementById('mobile-menu-toggle');
      const sidebar = document.getElementById('sidebar');
      mobileToggle.addEventListener('click', function() {
        sidebar.classList.toggle('active');
        if (sidebar.classList.contains('active')) {
          this.innerHTML = '<span>[ C L O S E ]</span>';
        } else {
          this.innerHTML = '<span>[ M E N U ]</span>';
        }
      });
    });
  </script>
</body>
</html>
