<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GoalFlow - Routine Matrix</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        letter-spacing: -0.01em;
      }

      .animate-in {
        animation: fadeIn 0.4s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Hide scrollbar for horizontal scroll regions */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none; /* IE and Edge */
        scrollbar-width: none; /* Firefox */
      }
      
      /* Timeline specific styles */
      .timeline-dot {
        position: relative;
      }
      .timeline-dot::after {
        content: '';
        position: absolute;
        bottom: -100%;
        left: 50%;
        transform: translateX(-50%);
        width: 2px;
        height: 100%;
        background-color: rgb(226 232 240);
        z-index: 0;
      }
      .dark .timeline-dot::after {
        background-color: rgba(255, 255, 255, 0.05);
      }
      .timeline-item:last-child .timeline-dot::after {
        display: none;
      }
    </style>
  </head>
  <body class="bg-[#fcfdfa] dark:bg-[#0f171a] transition-colors duration-700 min-h-screen text-slate-800 dark:text-slate-200">
    <div
      class="pb-24 max-w-md mx-auto relative shadow-2xl min-h-screen overflow-x-hidden border-x dark:border-white/5"
    >
      <div
        class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-64 bg-emerald-600/5 blur-[120px] pointer-events-none"
      ></div>

      <!-- Header & Controls -->
      <header class="sticky top-0 z-40 bg-[#fcfdfa]/90 dark:bg-[#0f171a]/90 backdrop-blur-xl border-b border-slate-200/50 dark:border-white/5 px-6 pt-10 pb-4">
        <div class="flex justify-between items-center mb-6">
          <div class="space-y-1">
            <h1 class="text-3xl font-extrabold tracking-tight text-slate-800 dark:text-slate-100">
              Routine
            </h1>
            <p class="text-slate-500 dark:text-emerald-300/60 text-sm font-medium">
              Your weekly matrix
            </p>
          </div>
          <button
            id="theme-toggle"
            class="p-2.5 rounded-2xl bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-white/5 transition-all hover:scale-110 active:scale-95"
          >
            <i data-lucide="sun" class="w-[18px] h-[18px] text-amber-200 hidden dark:inline"></i>
            <i data-lucide="moon" class="w-[18px] h-[18px] text-emerald-700 inline dark:hidden"></i>
          </button>
        </div>

        <!-- Segmented Control -->
        <div class="bg-slate-100 dark:bg-slate-800/60 p-1.5 rounded-[1.5rem] flex gap-1 relative border border-slate-200 dark:border-white/5 shadow-inner">
          <div id="segment-indicator" class="absolute top-1.5 bottom-1.5 left-1.5 w-[calc(33.333%-4px)] bg-white dark:bg-slate-700 rounded-xl shadow-sm transition-all duration-300 ease-out z-0"></div>
          
          <button data-view="day" class="view-btn flex-1 py-2.5 text-xs font-bold uppercase tracking-widest relative z-10 text-emerald-700 dark:text-emerald-400 transition-colors">
            Day
          </button>
          <button data-view="week" class="view-btn flex-1 py-2.5 text-xs font-bold uppercase tracking-widest relative z-10 text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 transition-colors">
            Week
          </button>
          <button data-view="month" class="view-btn flex-1 py-2.5 text-xs font-bold uppercase tracking-widest relative z-10 text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 transition-colors">
            Month
          </button>
        </div>
      </header>

      <!-- Main Content -->
      <main class="p-6">
        
        <!-- Day View -->
        <div id="view-day" class="animate-in space-y-6">
          <div class="flex items-center justify-between mb-2">
            <button id="prev-day" class="p-2 bg-slate-100 dark:bg-slate-800/60 rounded-xl hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
              <i data-lucide="chevron-left" class="w-5 h-5"></i>
            </button>
            <h2 id="current-day-label" class="text-lg font-black tracking-tight">Tuesday</h2>
            <button id="next-day" class="p-2 bg-slate-100 dark:bg-slate-800/60 rounded-xl hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
              <i data-lucide="chevron-right" class="w-5 h-5"></i>
            </button>
          </div>
          
          <div id="day-timeline" class="space-y-0 pl-2 mt-4 relative">
            <!-- Timeline items will be injected here -->
          </div>
        </div>

        <!-- Week View -->
        <div id="view-week" class="hidden animate-in">
          <div class="bg-white dark:bg-slate-800/40 rounded-[2rem] border border-slate-200 dark:border-white/5 shadow-xl overflow-hidden p-1">
            <div class="overflow-x-auto no-scrollbar pb-2">
              <table class="w-full text-left border-collapse min-w-[600px]">
                <thead>
                  <tr>
                    <th class="p-3 text-[10px] font-black uppercase text-slate-400 sticky left-0 bg-white/90 dark:bg-slate-800/90 backdrop-blur-sm z-20 w-24 border-b border-r border-slate-100 dark:border-white/5">Time</th>
                    <th class="p-3 text-xs font-bold text-center border-b border-slate-100 dark:border-white/5">Mon</th>
                    <th class="p-3 text-xs font-bold text-center border-b border-slate-100 dark:border-white/5">Tue</th>
                    <th class="p-3 text-xs font-bold text-center border-b border-slate-100 dark:border-white/5">Wed</th>
                    <th class="p-3 text-xs font-bold text-center border-b border-slate-100 dark:border-white/5">Thu</th>
                    <th class="p-3 text-xs font-bold text-center border-b border-slate-100 dark:border-white/5">Fri</th>
                    <th class="p-3 text-xs font-bold text-center border-b border-slate-100 dark:border-white/5">Sat</th>
                    <th class="p-3 text-xs font-bold text-center border-b border-slate-100 dark:border-white/5">Sun</th>
                  </tr>
                </thead>
                <tbody id="week-grid">
                  <!-- Grid items injected here -->
                </tbody>
              </table>
            </div>
          </div>
          <p class="text-center text-xs text-slate-400 mt-4 italic font-medium">Scroll horizontally to see all days</p>
        </div>

        <!-- Month View -->
        <div id="view-month" class="hidden animate-in space-y-6">
          <div class="bg-emerald-600 text-white p-6 rounded-[2rem] shadow-xl shadow-emerald-900/20 relative overflow-hidden">
            <div class="relative z-10 flex items-center gap-4">
              <div class="p-4 bg-white/20 rounded-2xl">
                <i data-lucide="target" class="fill-white w-8 h-8"></i>
              </div>
              <div>
                <h2 class="text-3xl font-black">86%</h2>
                <p class="text-xs font-bold uppercase tracking-widest opacity-80">
                  Matrix Adherence
                </p>
              </div>
            </div>
            <div class="absolute top-0 right-0 p-4 opacity-10">
              <i data-lucide="activity" class="w-24 h-24"></i>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div class="bg-white dark:bg-slate-800/40 p-5 rounded-[2rem] border border-slate-200 dark:border-white/5 text-center">
              <i data-lucide="briefcase" class="w-6 h-6 text-emerald-500 mx-auto mb-2"></i>
              <div class="text-2xl font-black text-slate-800 dark:text-slate-100">55h</div>
              <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Hustle/Work</div>
            </div>
            <div class="bg-white dark:bg-slate-800/40 p-5 rounded-[2rem] border border-slate-200 dark:border-white/5 text-center">
              <i data-lucide="book-open" class="w-6 h-6 text-amber-500 mx-auto mb-2"></i>
              <div class="text-2xl font-black text-slate-800 dark:text-slate-100">14h</div>
              <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Study/Prep</div>
            </div>
            <div class="bg-white dark:bg-slate-800/40 p-5 rounded-[2rem] border border-slate-200 dark:border-white/5 text-center">
              <i data-lucide="dumbbell" class="w-6 h-6 text-teal-500 mx-auto mb-2"></i>
              <div class="text-2xl font-black text-slate-800 dark:text-slate-100">7h</div>
              <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Fitness</div>
            </div>
            <div class="bg-white dark:bg-slate-800/40 p-5 rounded-[2rem] border border-slate-200 dark:border-white/5 text-center">
              <i data-lucide="moon" class="w-6 h-6 text-indigo-500 mx-auto mb-2"></i>
              <div class="text-2xl font-black text-slate-800 dark:text-slate-100">49h</div>
              <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Optimal Sleep</div>
            </div>
          </div>
          
          <div class="backdrop-blur-md bg-white/80 dark:bg-slate-800/40 border border-slate-200/60 dark:border-white/5 shadow-xl p-6 rounded-[2rem] mt-4">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">4-Week Projection</h3>
            <div class="grid grid-cols-7 gap-1">
              <!-- JS will fill this mini calendar grid -->
              <script>
                document.write(Array.from({length: 28}).map((_, i) => `<div class="aspect-square rounded-lg ${i%7 === 5 || i%7 === 6 ? 'bg-indigo-50 dark:bg-indigo-500/10' : 'bg-emerald-50 dark:bg-emerald-500/10 border border-emerald-100 dark:border-emerald-500/20'}"></div>`).join(''));
              </script>
            </div>
          </div>
        </div>
      </main>

      <!-- Task Details & Pomodoro Modal -->
      <div id="task-modal" class="fixed inset-0 z-50 flex items-end justify-center hidden pointer-events-none">
        <div id="task-modal-backdrop" class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm opacity-0 transition-opacity duration-300 pointer-events-auto"></div>
        <div id="task-modal-content" class="bg-white dark:bg-slate-900 w-full max-w-md rounded-t-[2.5rem] shadow-2xl border-t border-x border-slate-200 dark:border-white/10 p-6 pb-32 transform translate-y-full transition-transform duration-300 pointer-events-auto">
          
          <div class="flex justify-between items-start mb-6">
            <div class="space-y-1">
              <h2 id="modal-time-label" class="text-xs font-bold uppercase tracking-widest text-emerald-600 dark:text-emerald-400">00:00 - 00:00</h2>
              <div class="flex items-center gap-2">
                <i id="modal-icon" data-lucide="circle" class="w-5 h-5 text-slate-500"></i>
                <input type="text" id="modal-title" class="bg-transparent text-2xl font-black text-slate-800 dark:text-slate-100 outline-none w-full placeholder-slate-300 dark:placeholder-slate-700" placeholder="Task Title">
              </div>
            </div>
            <button id="close-modal" class="p-2 bg-slate-100 dark:bg-slate-800 rounded-full text-slate-500 hover:text-slate-800 dark:hover:text-slate-200">
              <i data-lucide="x" class="w-5 h-5"></i>
            </button>
          </div>

          <div class="space-y-6">
            <!-- Pomodoro Timer -->
            <div class="bg-slate-50 dark:bg-slate-800/50 p-6 rounded-[2rem] border border-slate-200 dark:border-white/5 flex flex-col items-center">
              <div class="relative w-40 h-40 flex items-center justify-center mb-6">
                <!-- SVG Ring -->
                <svg class="w-full h-full transform -rotate-90 absolute inset-0" viewBox="0 0 100 100">
                  <circle cx="50" cy="50" r="45" fill="none" class="stroke-slate-200 dark:stroke-slate-700" stroke-width="4"></circle>
                  <circle id="timer-ring" cx="50" cy="50" r="45" fill="none" class="stroke-emerald-500 transition-all duration-1000 ease-linear" stroke-width="6" stroke-dasharray="283" stroke-dashoffset="0" stroke-linecap="round"></circle>
                </svg>
                <div class="text-center z-10">
                  <div id="timer-display" class="text-4xl font-black text-slate-800 dark:text-slate-100 tabular-nums tracking-tighter">25:00</div>
                  <div id="timer-status" class="text-[10px] uppercase tracking-widest font-bold text-slate-400 mt-1">Focus</div>
                </div>
              </div>
              
              <div class="flex gap-4 w-full">
                <button id="timer-toggle" class="flex-1 bg-emerald-600 text-white py-3 rounded-2xl font-bold flexitems-center justify-center gap-2 shadow-lg shadow-emerald-600/20 active:scale-95 transition-transform">
                  <i data-lucide="play" class="w-4 h-4 inline-block"></i> Start
                </button>
                <button id="timer-reset" class="px-5 bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300 py-3 rounded-2xl font-bold active:scale-95 transition-transform">
                  <i data-lucide="rotate-ccw" class="w-4 h-4 inline-block"></i>
                </button>
              </div>
            </div>

            <!-- Task Config -->
            <div class="space-y-4">
              <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Category</label>
                <div class="relative">
                  <select id="modal-category" class="w-full bg-slate-50 dark:bg-slate-800/80 border border-slate-200 dark:border-white/10 rounded-xl p-3 text-sm font-bold text-slate-700 dark:text-slate-200 appearance-none outline-none focus:ring-2 focus:ring-emerald-500/50">
                    <option value="sleep">Sleep/Wake</option>
                    <option value="hustle">Side Hustle</option>
                    <option value="write">Writing</option>
                    <option value="fit">Fitness</option>
                    <option value="prep">Prep/Commute</option>
                    <option value="work">Job</option>
                    <option value="chore">Chores</option>
                    <option value="exam">Exam Prep</option>
                    <option value="social">Social</option>
                    <option value="free">Free Time</option>
                  </select>
                  <i data-lucide="chevron-down" class="w-4 h-4 absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
                </div>
              </div>

              <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Description</label>
                <textarea id="modal-desc" class="w-full bg-slate-50 dark:bg-slate-800/80 border border-slate-200 dark:border-white/10 rounded-xl p-3 text-sm font-medium text-slate-700 dark:text-slate-300 outline-none focus:ring-2 focus:ring-emerald-500/50 resize-none min-h-[80px]" placeholder="Specifics..."></textarea>
              </div>
            </div>
            
            <div class="flex gap-3 pt-2">
              <button id="btn-save" class="flex-1 bg-slate-900 dark:bg-slate-100 text-white dark:text-slate-900 py-4 rounded-2xl font-black shadow-xl active:scale-95 transition-transform">
                Save Routine
              </button>
              <button id="btn-clear" class="px-6 bg-rose-50 dark:bg-rose-500/10 text-rose-600 dark:text-rose-400 py-4 rounded-2xl font-bold active:scale-95 transition-transform">
                Clear
              </button>
            </div>
            
          </div>
        </div>
      </div>

      <!-- Floating Bottom Navigation -->
      <nav
        class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-[360px] backdrop-blur-2xl rounded-[2.5rem] p-3 flex justify-around items-center z-50 transition-all border shadow-2xl bg-white/90 dark:bg-slate-900/90 border-slate-200 dark:border-white/10"
      >
        <button
          class="nav-link relative flex flex-col items-center gap-1.5 transition-all duration-300 py-2 px-4 rounded-[2rem] text-slate-400 dark:text-slate-500 hover:text-emerald-600 dark:hover:text-emerald-400"
          onclick="window.location.href='index.html'"
        >
          <div class="nav-bg absolute inset-0 bg-emerald-500/10 rounded-[2rem] hidden"></div>
          <i data-lucide="calendar" class="w-[22px] h-[22px]"></i>
          <span class="text-[9px] font-black uppercase tracking-[0.1em]">DAILY</span>
        </button>
        <button
          class="nav-btn relative flex flex-col items-center gap-1.5 transition-all duration-300 py-2 px-4 rounded-[2rem] text-emerald-700 dark:text-emerald-400"
        >
          <div class="nav-bg absolute inset-0 bg-emerald-500/10 rounded-[2rem]"></div>
          <i data-lucide="layout-grid" class="w-[22px] h-[22px]"></i>
          <span class="text-[9px] font-black uppercase tracking-[0.1em]">ROUTINE</span>
        </button>
        <button
          class="nav-link relative flex flex-col items-center gap-1.5 transition-all duration-300 py-2 px-4 rounded-[2rem] text-slate-400 dark:text-slate-500 hover:text-emerald-600 dark:hover:text-emerald-400"
          onclick="window.location.href='index.html'"
        >
          <div class="nav-bg absolute inset-0 bg-emerald-500/10 rounded-[2rem] hidden"></div>
          <i data-lucide="bar-chart-3" class="w-[22px] h-[22px]"></i>
          <span class="text-[9px] font-black uppercase tracking-[0.1em]">AUDIT</span>
        </button>
        <button
          class="nav-link relative flex flex-col items-center gap-1.5 transition-all duration-300 py-2 px-4 rounded-[2rem] text-slate-400 dark:text-slate-500 hover:text-emerald-600 dark:hover:text-emerald-400"
          onclick="window.location.href='index.html'"
        >
          <div class="nav-bg absolute inset-0 bg-emerald-500/10 rounded-[2rem] hidden"></div>
          <i data-lucide="moon" class="w-[22px] h-[22px]"></i>
          <span class="text-[9px] font-black uppercase tracking-[0.1em]">SYNC</span>
        </button>
      </nav>
    </div>

    <!-- Application Logic -->
    <script>
      // Routine Data Matrix (Initial default state)
      const defaultSlots = [
        {label:"10:00 PM – 5:00 AM",rows:[
          {cls:"sleep",text:"Sleep",sub:"7 hrs"}, {cls:"sleep",text:"Sleep",sub:"7 hrs"}, {cls:"sleep",text:"Sleep",sub:"7 hrs"}, {cls:"sleep",text:"Sleep",sub:"7 hrs"}, {cls:"sleep",text:"Sleep",sub:"7 hrs"}, {cls:"sleep",text:"Sleep",sub:"7.5 hrs"}, {cls:"sleep",text:"Sleep",sub:"7.5 hrs"},
        ]},
        {label:"5:00 – 5:15 AM",rows:[
          {cls:"sleep",text:"Wake ritual",sub:"hydrate"}, {cls:"sleep",text:"Wake ritual",sub:"hydrate"}, {cls:"sleep",text:"Wake ritual",sub:"hydrate"}, {cls:"sleep",text:"Wake ritual",sub:"hydrate"}, {cls:"sleep",text:"Wake ritual",sub:"hydrate"}, {cls:"sleep",text:"Wake",sub:"5:30 AM"}, {cls:"sleep",text:"Wake",sub:"5:30 AM"},
        ]},
        {label:"5:15 – 6:00 AM",rows:[
          {cls:"hustle",text:"Side hustle",sub:"deep work"}, {cls:"hustle",text:"Side hustle",sub:"deep work"}, {cls:"hustle",text:"Side hustle",sub:"deep work"}, {cls:"hustle",text:"Side hustle",sub:"deep work"}, {cls:"hustle",text:"Side hustle",sub:"deep work"}, {cls:"write",text:"Writing",sub:"long session"}, {cls:"write",text:"Writing",sub:"+ journal"},
        ]},
        {label:"6:00 – 6:45 AM",rows:[
          {cls:"write",text:"Writing",sub:"30–40 min"}, {cls:"write",text:"Writing",sub:"30–40 min"}, {cls:"write",text:"Writing",sub:"30–40 min"}, {cls:"write",text:"Writing",sub:"30–40 min"}, {cls:"write",text:"Writing",sub:"30–40 min"}, {cls:"hustle",text:"Big hustle",sub:"2–3 hrs"}, {cls:"hustle",text:"Big hustle",sub:"2–3 hrs"},
        ]},
        {label:"6:45 – 7:45 AM",rows:[
          {cls:"fit",text:"Fitness",sub:"gym / run"}, {cls:"fit",text:"Fitness",sub:"gym / run"}, {cls:"fit",text:"Fitness",sub:"gym / run"}, {cls:"fit",text:"Fitness",sub:"gym / run"}, {cls:"fit",text:"Fitness",sub:"gym / run"}, {cls:"hustle",text:"Big hustle",sub:"continued"}, {cls:"hustle",text:"Big hustle",sub:"continued"},
        ]},
        {label:"7:45 – 9:00 AM",rows:[
          {cls:"prep",text:"Prep + commute",sub:"GK podcast"}, {cls:"prep",text:"Prep + commute",sub:"GK podcast"}, {cls:"prep",text:"Prep + commute",sub:"GK podcast"}, {cls:"prep",text:"Prep + commute",sub:"GK podcast"}, {cls:"prep",text:"Prep + commute",sub:"GK podcast"}, {cls:"fit",text:"Fitness",sub:"outdoor / gym"}, {cls:"fit",text:"Fitness",sub:"outdoor / gym"},
        ]},
        {label:"9:00 AM – 6:00 PM",rows:[
          {cls:"work",text:"Job shift",sub:"9 hrs"}, {cls:"work",text:"Job shift",sub:"9 hrs"}, {cls:"work",text:"Job shift",sub:"9 hrs"}, {cls:"work",text:"Job shift",sub:"9 hrs"}, {cls:"work",text:"Job shift",sub:"9 hrs"}, {cls:"exam",text:"Mock test",sub:"NQT / CMAT"}, {cls:"exam",text:"Weak area",sub:"revision"},
        ]},
        {label:"6:00 – 7:00 PM",rows:[
          {cls:"chore",text:"Chores",sub:"decompress"}, {cls:"chore",text:"Chores",sub:"decompress"}, {cls:"chore",text:"Chores",sub:"decompress"}, {cls:"chore",text:"Chores",sub:"decompress"}, {cls:"chore",text:"Chores",sub:"decompress"}, {cls:"social",text:"Social",sub:"friends / family"}, {cls:"chore",text:"Diet prep",sub:"batch cook"},
        ]},
        {label:"7:00 – 8:30 PM",rows:[
          {cls:"exam",text:"Exam prep",sub:"Quant"}, {cls:"exam",text:"Exam prep",sub:"Logic"}, {cls:"exam",text:"Exam prep",sub:"Verbal"}, {cls:"exam",text:"Exam prep",sub:"GK / CA"}, {cls:"exam",text:"Exam prep",sub:"Quant DI"}, {cls:"social",text:"Social",sub:"continued"}, {cls:"chore",text:"Weekly plan",sub:"+ admin"},
        ]},
        {label:"8:30 – 9:30 PM",rows:[
          {cls:"hustle",text:"Hustle sprint",sub:"+ task prep"}, {cls:"hustle",text:"Hustle sprint",sub:"+ task prep"}, {cls:"hustle",text:"Hustle sprint",sub:"+ task prep"}, {cls:"hustle",text:"Hustle sprint",sub:"+ task prep"}, {cls:"hustle",text:"Hustle sprint",sub:"+ task prep"}, {cls:"free",text:"Free time",sub:"leisure"}, {cls:"free",text:"Free time",sub:"leisure"},
        ]},
        {label:"9:30 – 10:00 PM",rows:[
          {cls:"sleep",text:"Wind-down",sub:"book / stretch"}, {cls:"sleep",text:"Wind-down",sub:"book / stretch"}, {cls:"sleep",text:"Wind-down",sub:"book / stretch"}, {cls:"sleep",text:"Wind-down",sub:"book / stretch"}, {cls:"sleep",text:"Wind-down",sub:"book / stretch"}, {cls:"sleep",text:"Wind-down",sub:"screens off"}, {cls:"sleep",text:"Wind-down",sub:"screens off"},
        ]},
      ];

      // Load from LocalStorage
      let matrixData = JSON.parse(localStorage.getItem('routine_slots_data')) || defaultSlots;

      const daysOfWeek = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
      let currentDayIndex = 0; // Monday start
      
      const themeColors = {
        sleep:  "bg-indigo-100 dark:bg-indigo-950/40   text-indigo-800 dark:text-indigo-300   border-indigo-200 dark:border-indigo-800/30",
        hustle: "bg-purple-100 dark:bg-purple-950/40   text-purple-800 dark:text-purple-300   border-purple-200 dark:border-purple-800/30",
        write:  "bg-amber-100  dark:bg-amber-950/40    text-amber-800  dark:text-amber-300    border-amber-200  dark:border-amber-800/30",
        fit:    "bg-emerald-100 dark:bg-emerald-950/40 text-emerald-800 dark:text-emerald-300 border-emerald-200 dark:border-emerald-800/30",
        prep:   "bg-yellow-100 dark:bg-yellow-950/40   text-yellow-800 dark:text-yellow-300   border-yellow-200 dark:border-yellow-800/30",
        work:   "bg-teal-100   dark:bg-teal-950/40     text-teal-800   dark:text-teal-300     border-teal-200   dark:border-teal-800/30",
        chore:  "bg-slate-100  dark:bg-slate-800/60    text-slate-700  dark:text-slate-300    border-slate-200  dark:border-slate-700/50",
        exam:   "bg-rose-100   dark:bg-rose-950/40     text-rose-800   dark:text-rose-300     border-rose-200   dark:border-rose-800/30",
        social: "bg-blue-100   dark:bg-blue-950/40     text-blue-800   dark:text-blue-300     border-blue-200   dark:border-blue-800/30",
        free:   "bg-slate-200  dark:bg-slate-800/20    text-slate-600  dark:text-slate-400    border-slate-300  dark:border-slate-700/30"
      };

      // Generate Icon mapping based on category
      function getIcon(cls) {
        const iconMap = {
          sleep: 'moon', hustle: 'rocket', write: 'feather', fit: 'dumbbell', 
          prep: 'headphones', work: 'briefcase', chore: 'list-todo', 
          exam: 'book-open', social: 'users', free: 'coffee'
        };
        return iconMap[cls] || 'circle';
      }

      // Render Day View
      function renderDayView(dayIdx) {
        $("#current-day-label").textContent = daysOfWeek[dayIdx];
        const timeline = $("#day-timeline");
        timeline.innerHTML = "";
        
        matrixData.forEach((slot, targetSlotIdx) => {
          const item = slot.rows[dayIdx];
          const colors = themeColors[item.cls] || themeColors.free;
          const icon = getIcon(item.cls);
          
          const timeLabel = slot.label.split(" – ").join("<br/>");

          const el = document.createElement("div");
          el.className = "flex gap-4 timeline-item mb-6";
          el.innerHTML = `
            <div class="w-16 flex-shrink-0 text-right text-[10px] font-bold text-slate-400 pt-2 leading-snug cursor-pointer" onclick="openTaskModal(${targetSlotIdx}, ${dayIdx})">
              ${timeLabel}
            </div>
            <div class="relative timeline-dot z-10 flex-shrink-0 pt-1">
              <div class="w-8 h-8 rounded-full bg-white dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 flex items-center justify-center shadow-sm">
                <i data-lucide="${icon}" class="w-3.5 h-3.5 text-slate-400"></i>
              </div>
            </div>
            <div class="flex-1">
              <div onclick="openTaskModal(${targetSlotIdx}, ${dayIdx})" class="rounded-2xl border p-4 shadow-sm ${colors} transition-transform hover:scale-[1.02] active:scale-[0.98] cursor-pointer">
                <h4 class="font-bold text-sm mb-1">${item.text}</h4>
                <p class="text-xs opacity-80 font-medium">${item.sub}</p>
              </div>
            </div>
          `;
          timeline.appendChild(el);
        });
        lucide.createIcons();
      }

      function renderWeekView() {
        const grid = $("#week-grid");
        grid.innerHTML = "";
        matrixData.forEach((slot, slotIdx) => {
          const tr = document.createElement("tr");
          let html = `<th class="p-3 text-[10px] font-bold text-slate-400 sticky left-0 bg-white dark:bg-[#0f171a] z-10 border-b border-r border-slate-100 dark:border-white/5 align-top">${slot.label.split(" – ").join("<br>")}</th>`;
          
          slot.rows.forEach((r, dayIdx) => {
            const colors = themeColors[r.cls] || themeColors.free;
            html += `
              <td class="p-1 border-b border-slate-100 dark:border-white/5 min-w-[100px] h-[80px]">
                <div onclick="openTaskModal(${slotIdx}, ${dayIdx})" class="w-full h-full rounded-xl border p-2 flex flex-col justify-center items-center text-center ${colors} transition-all hover:scale-105 hover:shadow-lg cursor-pointer">
                  <span class="text-[10px] font-bold leading-tight line-clamp-2">${r.text}</span>
                  <span class="text-[8px] opacity-80 mt-1">${r.sub}</span>
                </div>
              </td>
            `;
          });
          tr.innerHTML = html;
          grid.appendChild(tr);
        });
      }

      // Initialization and State
      const $ = (s) => document.querySelector(s);
      const $$ = (s) => document.querySelectorAll(s);

      let currentView = "day"; // day, week, month

      function setView(view) {
        currentView = view;
        
        // Update tabs styling
        $$(".view-btn").forEach(btn => {
          if(btn.dataset.view === view) {
            btn.classList.add("text-emerald-700", "dark:text-emerald-400");
            btn.classList.remove("text-slate-500", "dark:text-slate-500");
          } else {
            btn.classList.remove("text-emerald-700", "dark:text-emerald-400");
            btn.classList.add("text-slate-500", "dark:text-slate-500");
          }
        });

        // Move indicator
        const indicator = $("#segment-indicator");
        if(view === 'day') indicator.style.transform = "translateX(0)";
        else if(view === 'week') indicator.style.transform = "translateX(100%)";
        else indicator.style.transform = "translateX(200%)";

        // Toggle views
        $("#view-day").classList.toggle("hidden", view !== "day");
        $("#view-week").classList.toggle("hidden", view !== "week");
        $("#view-month").classList.toggle("hidden", view !== "month");
      }

      // POMODORO TIMER LOGIC
      let timerInterval;
      let timeRemaining = 0;
      let isTimerRunning = false;
      let totalDuration = 0;

      function parseTimeDuration(label) {
        // Simple heuristic: if diff is obvious parse it, otherwise default 25
        const defaultMins = 25;
        try {
          // Label format ex: "6:00 – 6:45 AM"
          const parts = label.split("–");
          if(parts.length < 2) return defaultMins;
          
          const t1 = parts[0].trim();
          const t2 = parts[1].trim();

          // Assume AM/PM is shared if only on right
          let pm = t2.includes("PM");
          let am = t2.includes("AM");

          const parseT = (t, pmFlag) => {
            t = t.replace("AM", "").replace("PM", "").trim();
            let [h, m] = t.split(":");
            h = parseInt(h); m = parseInt(m || 0);
            if(pmFlag && h !== 12) h += 12;
            if(!pmFlag && h === 12) h = 0;
            return h * 60 + m;
          };

          const m1 = parseT(t1, pm && !t1.includes("AM"));
          const m2 = parseT(t2, pm);
          
          let diff = m2 - m1;
          if(diff < 0) diff += 24*60; // overnight
          return diff > 0 && diff < 1440 ? diff : defaultMins;
        } catch(e) {
          return defaultMins;
        }
      }

      function updateTimerDisplay() {
        const m = Math.floor(timeRemaining / 60);
        const s = timeRemaining % 60;
        $("#timer-display").textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        
        const offset = 283 - (timeRemaining / totalDuration) * 283;
        $("#timer-ring").style.strokeDashoffset = Math.max(0, offset);
      }

      function toggleTimer() {
        const btn = $("#timer-toggle");
        if(isTimerRunning) {
          clearInterval(timerInterval);
          btn.innerHTML = `<i data-lucide="play" class="w-4 h-4 inline-block"></i> Resume`;
          $("#timer-status").textContent = "Paused";
        } else {
          timerInterval = setInterval(() => {
            timeRemaining--;
            if(timeRemaining <= 0) {
              clearInterval(timerInterval);
              timeRemaining = 0;
              isTimerRunning = false;
              $("#timer-status").textContent = "Done";
              btn.innerHTML = `<i data-lucide="check" class="w-4 h-4 inline-block"></i> Complete`;
              // play sound
            }
            updateTimerDisplay();
          }, 1000);
          btn.innerHTML = `<i data-lucide="pause" class="w-4 h-4 inline-block"></i> Pause`;
          $("#timer-status").textContent = "Focus";
        }
        isTimerRunning = !isTimerRunning;
        lucide.createIcons();
      }

      function resetTimer(mins) {
        clearInterval(timerInterval);
        isTimerRunning = false;
        totalDuration = mins * 60;
        timeRemaining = totalDuration;
        const btn = $("#timer-toggle");
        btn.innerHTML = `<i data-lucide="play" class="w-4 h-4 inline-block"></i> Start`;
        $("#timer-status").textContent = "Ready";
        updateTimerDisplay();
        lucide.createIcons();
      }

      // MODAL LOGIC
      let editingSlotInfo = null;

      function openTaskModal(slotIdx, dayIdx) {
        editingSlotInfo = { slotIdx, dayIdx };
        const slotData = matrixData[slotIdx];
        const cellData = slotData.rows[dayIdx];

        $("#modal-time-label").textContent = `${daysOfWeek[dayIdx]} | ${slotData.label}`;
        $("#modal-title").value = cellData.text;
        $("#modal-category").value = cellData.cls;
        $("#modal-desc").value = cellData.sub;
        
        const iconName = getIcon(cellData.cls);
        $("#modal-icon").setAttribute("data-lucide", iconName);
        lucide.createIcons();

        // Init Pomodoro
        const mins = parseTimeDuration(slotData.label);
        resetTimer(mins);

        // Show modal
        $("#task-modal").classList.remove("hidden");
        // Trigger animations
        setTimeout(() => {
          $("#task-modal-backdrop").classList.remove("opacity-0");
          $("#task-modal-content").classList.remove("translate-y-full");
        }, 10);
      }

      function closeTaskModal() {
        $("#task-modal-backdrop").classList.add("opacity-0");
        $("#task-modal-content").classList.add("translate-y-full");
        setTimeout(() => {
          $("#task-modal").classList.add("hidden");
        }, 300);
        clearInterval(timerInterval);
      }

      function saveModalTask() {
        if(!editingSlotInfo) return;
        const {slotIdx, dayIdx} = editingSlotInfo;
        
        const title = $("#modal-title").value.trim() || "Untitled";
        const cat = $("#modal-category").value;
        const desc = $("#modal-desc").value.trim();

        matrixData[slotIdx].rows[dayIdx] = {
          cls: cat,
          text: title,
          sub: desc
        };

        localStorage.setItem("routine_slots_data", JSON.stringify(matrixData));
        renderDayView(currentDayIndex);
        renderWeekView();
        closeTaskModal();
      }

      function clearModalTask() {
        if(!editingSlotInfo) return;
        $("#modal-title").value = "Free Time";
        $("#modal-category").value = "free";
        $("#modal-desc").value = "";
        saveModalTask();
      }

      function initApp() {
        // Dark mode setup
        const isDarkMode = localStorage.getItem("darkMode") !== "false";
        if(isDarkMode) document.documentElement.classList.add("dark");
        
        $("#theme-toggle").addEventListener("click", () => {
          document.documentElement.classList.toggle("dark");
          localStorage.setItem("darkMode", document.documentElement.classList.contains("dark"));
        });

        // View tabs
        $$(".view-btn").forEach(btn => {
          btn.addEventListener("click", () => setView(btn.dataset.view));
        });

        // Day navigation
        $("#prev-day").addEventListener("click", () => {
          currentDayIndex = (currentDayIndex - 1 + 7) % 7;
          renderDayView(currentDayIndex);
        });
        
        $("#next-day").addEventListener("click", () => {
          currentDayIndex = (currentDayIndex + 1) % 7;
          renderDayView(currentDayIndex);
        });

        // Modal Events
        $("#close-modal").addEventListener("click", closeTaskModal);
        $("#task-modal-backdrop").addEventListener("click", closeTaskModal);
        $("#btn-save").addEventListener("click", saveModalTask);
        $("#btn-clear").addEventListener("click", clearModalTask);
        
        // Timer Events
        $("#timer-toggle").addEventListener("click", toggleTimer);
        $("#timer-reset").addEventListener("click", () => {
          if(editingSlotInfo) {
            const slotData = matrixData[editingSlotInfo.slotIdx];
            resetTimer(parseTimeDuration(slotData.label));
          }
        });

        // Trigger icon update on category change
        $("#modal-category").addEventListener("change", (e) => {
           $("#modal-icon").setAttribute("data-lucide", getIcon(e.target.value));
           lucide.createIcons();
        });

        // Render initial
        renderDayView(currentDayIndex);
        renderWeekView();
        lucide.createIcons();
      }

      document.addEventListener("DOMContentLoaded", initApp);
    </script>
  </body>
</html>
